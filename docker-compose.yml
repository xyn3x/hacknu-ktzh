services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      retries: 5

  redpanda-console:
    image: redpandadata/console:v2.4.3
    ports:
      - "8888:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  ingestion:
    build: ./services/ingestion
    ports:
      - "8081:8081"
    environment:
      REDPANDA_BROKERS: redpanda:29092
      PORT: 8081
    depends_on:
      redpanda:
        condition: service_healthy

  simulator:
    build: ./services/simulator
    depends_on:
      - ingestion

  processing:
    build: ./services/processing
    environment:
      REDPANDA_BROKERS: redpanda:29092
      POSTGRES_DSN: postgres://postgres:postgres@timescaledb:5432/telemetry?sslmode=disable
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_started

  # ── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build: ./services/api-gateaway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      REDPANDA_BROKERS: redpanda:29092
      POSTGRES_DSN: postgres://postgres:postgres@timescaledb:5432/telemetry?sslmode=disable
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_started
      processing:
        condition: service_started

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build: ./services/frontend
    ports:
      - "3000:3000"
    environment:
      # Points Next.js rewrites to the gateway inside the Docker network
      NEXT_PUBLIC_API_GATEWAY_URL: http://api-gateway:8080
    depends_on:
      - api-gateway

volumes:
  pg_data:
